name: Rust

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test

      - name: Cargo build release
        run: cargo build --release

      - name: Upload Windows binary
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: office-tools-windows-x64
          path: target/release/office-tools.exe
          if-no-files-found: error

      - name: Upload Linux binary
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: office-tools-linux-x64
          path: target/release/office-tools
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: office-tools-*
          path: dist

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          cp dist/office-tools-windows-x64/office-tools.exe release/office-tools-windows-x64.exe
          cp dist/office-tools-linux-x64/office-tools release/office-tools-linux-x64
          chmod +x release/office-tools-linux-x64
          sha256sum release/* > release/SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: office-tools ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/office-tools-windows-x64.exe
            release/office-tools-linux-x64
            release/SHA256SUMS
