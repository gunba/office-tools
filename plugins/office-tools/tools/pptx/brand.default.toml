# office-tools — default neutral brand palette for the pptx tool.
#
# To override: either drop a `brand.toml` next to this file with the same
# schema (any subset of the keys below; missing keys fall back to the
# defaults here), or point the BRAND_TOML_PATH env var / userConfig entry
# at an alternate TOML file anywhere on disk.

[colors]
accent_primary    = "#1F3A66"   # dividers, accents, primary call-outs
accent_secondary  = "#5C7A9A"   # secondary accent — H2s, callouts
dark_navy         = "#0A1A33"   # titles, dark text
body_text         = "#3F4A55"   # body text
light_grey        = "#CCCFCF"   # rules, light fills
medium_grey       = "#888B8D"   # footer, secondary text
mid_grey_20       = "#E7E7E8"   # subtle backgrounds
pale_blue         = "#E5F0F8"   # quote / callout backgrounds
white             = "#FFFFFF"
black             = "#000000"

[fonts]
family            = "Calibri"   # any installed Windows/macOS font name

[sizes]                          # all in points
title             = 30
subtitle          = 18
section_title     = 44
section_num       = 96
body              = 18
small_body        = 14
panel_header      = 18
panel_body        = 14
quote             = 28
quote_attr        = 14
footer            = 9
table_header      = 11
table_body        = 10

[slide]                          # all in inches; defaults match 16:9
width             = 13.333
height            = 7.5
margin_l          = 0.55
margin_r          = 0.55
margin_t          = 0.45
margin_b          = 0.40
title_top         = 0.55
title_height      = 0.65
content_top       = 1.45
content_h         = 5.5
footer_bar_height = 0.05
footer_bar_top    = 7.20
footer_text_top   = 7.28
footer_text_h     = 0.20
accent_rule_top   = 1.25
accent_rule_height = 0.04
accent_rule_width = 1.20

[logo]
# Absolute path to a logo image rendered top-right on chrome slides.
# Empty string = no logo (the chrome still renders the accent rule and footer).
path              = ""
width_inches      = 0.85
top_inches        = 0.30
